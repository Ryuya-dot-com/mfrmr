# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Runs `R CMD check --as-cran` on every push and pull request, across the
# Linux / macOS / Windows matrix at R release, devel, and oldrel-1.
on:
  push:
    branches: [main, master, 'dev/**']
  pull_request:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"warning"'
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

      - name: Upload check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r-cmd-check-${{ matrix.config.os }}-${{ matrix.config.r }}
          path: |
            check
            *.Rcheck
          if-no-files-found: ignore

      - name: Release-readiness gate
        run: |
          source("inst/validation/release-readiness.R")
          readiness <- mfrmr_release_readiness_review(pkg_dir = ".")
          print(summary(readiness))
          if (any(readiness$gate_summary$Status == "concern", na.rm = TRUE)) {
            stop("Release-readiness gate has concern rows.", call. = FALSE)
          }
        shell: Rscript {0}
