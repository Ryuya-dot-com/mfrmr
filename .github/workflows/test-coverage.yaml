# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Computes test coverage with covr on every push to main and on every pull
# request, then uploads the cobertura report, the rendered HTML summary,
# and a plain-text summary as workflow artifacts. No external coverage
# service is contacted.
on:
  push:
    branches: [main, master]
  pull_request:

name: test-coverage

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2, any::DT, any::htmltools
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
          covr::report(cov, file = "coverage-report.html", browse = FALSE)
          writeLines(format(cov), "coverage-summary.txt")
        shell: Rscript {0}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            cobertura.xml
            coverage-report.html
            coverage-summary.txt

      - name: Show test output on failure
        if: failure()
        run: find ${{ runner.temp }}/package -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash
