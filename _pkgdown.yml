  - title: Hierarchical Structure and Sample Adequacy
    desc: >-
      Descriptive review of the observed design. All helpers leave
      estimation unchanged; they classify nesting, surface small-N
      facet levels, and add ICC / Kish design-effect summaries on
      top of the fixed-effects MFRM fit.
    contents:
      - detect_facet_nesting
      - facet_small_sample_review
      - compute_facet_icc
      - compute_facet_design_effect
      - mfrm_generalizability
      - analyze_hierarchical_structure
  - title: Additional Visualizations
    desc: >-
      Visualizations added in 0.1.6 that complement the core plot.mfrm_fit
      surface: threshold ladder for category-structure diagnostics, person-fit
      bubble for KIDMAP-style review, rater severity profile with CI bands,
      DIF summary, APA Figure 1 publication composite, and a second wave
      of Guttman-scalogram / Q-Q / trajectory / agreement-heatmap views.
    contents:
      - plot_threshold_ladder
      - plot_person_fit
      - plot_rater_severity_profile
      - plot_dif_summary
      - plot_apa_figure_one
      - plot_guttman_scalogram
